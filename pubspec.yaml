name: chromapulse
description: "ChromaPulse - Train your color vision."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  shared_preferences: ^2.5.0
  audioplayers: ^6.1.0
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_source.png"
  remove_alpha_ios: true
  background_color_ios: "#0A0A0F"

flutter_native_splash:
  # Matches ChromaPulse brand: dark near-black background, centered icon.
  color: "#0A0A0F"
  image: "assets/icon/icon_source.png"
  android_12:
    color: "#0A0A0F"
    image: "assets/icon/icon_source.png"
    icon_background_color: "#0A0A0F"
  ios_content_mode: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icon/
